name: Build Android APK

# Builds an installable debug APK for the Gemini Live Translator.
# Run it from the Actions tab (Run workflow) or on pushes that touch the app.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/gemini-live-audio-translator-2rt18z
    paths:
      - "gemini_live_translator/**"
      - ".github/workflows/android-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to publish the APK as a Release asset
    defaults:
      run:
        working-directory: gemini_live_translator

    steps:
      - uses: actions/checkout@v4

      - name: Use a fixed debug keystore (so updates install over old builds)
        # Without this, Gradle generates a fresh random debug key every run, so
        # each APK has a different signature and Android refuses to install a new
        # build over a previously-installed one ("App not installed").
        run: |
          mkdir -p ~/.android
          cp ci-debug.keystore ~/.android/debug.keystore

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Inject microphone permissions
        run: node scripts/patch-android.mjs

      - name: Sync web assets into the native project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-translator-debug-apk
          path: gemini_live_translator/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Publish a public, login-free direct download at /releases/latest
      - name: Publish APK to Releases (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Hyun Live Translator — latest APK
          body: |
            최신 안드로이드 APK입니다. 아래 **Assets**의 `app-debug.apk` 를 눌러 받으세요.
            (로그인·압축 불필요 · 폰에서 바로 설치)
          files: gemini_live_translator/android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true

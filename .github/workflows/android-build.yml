name: Build Android APK

# Builds an installable debug APK for the Gemini Live Translator.
# Run it from the Actions tab (Run workflow) or on pushes that touch the app.
on:
  workflow_dispatch:
  push:
    branches:
      - claude/gemini-live-audio-translator-2rt18z
    paths:
      - "gemini_live_translator/**"
      - ".github/workflows/android-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gemini_live_translator

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Inject microphone permissions
        run: node scripts/patch-android.mjs

      - name: Sync web assets into the native project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-translator-debug-apk
          path: gemini_live_translator/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

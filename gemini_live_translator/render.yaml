# Render Blueprint — one-click deploy of the translator backend.
#
# Usage:
#   1. Push this repo to GitHub.
#   2. In the Render dashboard: New > Blueprint, pick this repo.
#   3. When prompted, paste your GEMINI_API_KEY (it is kept secret).
#
# Render injects $PORT and terminates TLS, so the public URL is https/wss —
# exactly what the Android app needs.
services:
  - type: web
    name: gemini-live-translator
    runtime: docker
    rootDir: gemini_live_translator
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false # prompted on deploy, stored as a secret
      - key: GEMINI_LIVE_MODEL
        value: gemini-2.0-flash-exp
      - key: GEMINI_VOICE
        value: Aoede
      # Gate the WebSocket so only your app can use it. Render generates a
      # strong random value; copy it from the dashboard (Environment tab) into
      # the app's "Access Token" field.
      - key: ACCESS_TOKEN
        generateValue: true

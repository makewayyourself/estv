<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Hyun Live Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .pulse-dot { animation: pulse 1.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(.82)} }
      .scroll-thin { scrollbar-width: thin; scrollbar-color: #3f3f5f transparent; }
      .scroll-thin::-webkit-scrollbar { width: 6px; }
      .scroll-thin::-webkit-scrollbar-thumb { background: #3f3f5f; border-radius: 3px; }
      [data-view][hidden] { display: none; }
      /* font scale on transcript areas */
      .fs-sm { font-size: 0.9rem; } .fs-md { font-size: 1rem; } .fs-lg { font-size: 1.15rem; } .fs-xl { font-size: 1.3rem; }

      /* Light theme overrides */
      body.light { background:#eef2f7; color:#0f172a; }
      body.light .bg-slate-950,body.light .bg-slate-900,body.light .bg-slate-900\/60{background:#fff!important}
      body.light .bg-slate-950\/60,body.light .bg-slate-950\/50,body.light .bg-slate-800{background:#f1f5f9!important}
      body.light .border-slate-800,body.light .border-slate-700{border-color:#e2e8f0!important}
      body.light .text-slate-100,body.light .text-slate-200{color:#0f172a!important}
      body.light .text-slate-300{color:#334155!important}
      body.light .text-slate-400{color:#475569!important}
      body.light .text-slate-500{color:#64748b!important}
      body.light .text-slate-600{color:#94a3b8!important}
      body.light .placeholder\:text-slate-500::placeholder{color:#94a3b8!important}
      body.light .bg-black\/20{background:rgba(15,23,42,.06)!important}
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <div class="mx-auto flex min-h-screen max-w-2xl flex-col">
      <!-- App bar -->
      <header class="sticky top-0 z-20 flex items-center gap-3 border-b border-slate-800 bg-slate-950/90 px-4 py-3 backdrop-blur">
        <button id="backBtn" class="hidden rounded-full px-2 py-1 text-xl text-slate-300 hover:bg-slate-800">‹</button>
        <h1 id="viewTitle" class="flex-1 text-lg font-bold">
          <span class="bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">Hyun Live Translator</span>
        </h1>
        <div id="statusBadge" class="flex items-center gap-1.5 rounded-full border border-slate-700 bg-slate-900 px-3 py-1 text-xs">
          <span id="statusDot" class="h-2 w-2 rounded-full bg-slate-500"></span>
          <span id="statusText" class="font-medium text-slate-300">—</span>
        </div>
      </header>

      <main class="flex-1 px-4 py-5">
        <!-- ============ HOME ============ -->
        <section data-view="home">
          <div class="space-y-3">
            <button data-go="translate" class="flex w-full items-center gap-4 rounded-2xl border border-slate-800 bg-slate-900/60 p-5 text-left transition hover:border-indigo-500/60">
              <span class="text-3xl">🎙️</span>
              <span class="flex-1">
                <span class="block font-semibold" data-i18n="home.translate">빠른 통역</span>
                <span class="block text-sm text-slate-400" data-i18n="home.translateDesc">즉석 실시간 통역·자막 (저장 안 함)</span>
              </span>
              <span class="text-slate-600">›</span>
            </button>
            <button data-go="notes" class="flex w-full items-center gap-4 rounded-2xl border border-slate-800 bg-slate-900/60 p-5 text-left transition hover:border-indigo-500/60">
              <span class="text-3xl">📝</span>
              <span class="flex-1">
                <span class="block font-semibold" data-i18n="home.notes">회의 노트</span>
                <span class="block text-sm text-slate-400" data-i18n="home.notesDesc">녹음·기록·요약 · 주제/날짜로 검색</span>
              </span>
              <span class="text-slate-600">›</span>
            </button>
            <button data-go="settings" class="flex w-full items-center gap-4 rounded-2xl border border-slate-800 bg-slate-900/60 p-5 text-left transition hover:border-indigo-500/60">
              <span class="text-3xl">⚙️</span>
              <span class="flex-1">
                <span class="block font-semibold" data-i18n="home.settings">설정</span>
                <span class="block text-sm text-slate-400" data-i18n="home.settingsDesc">언어·테마·서버·표시언어·보기모드</span>
              </span>
              <span class="text-slate-600">›</span>
            </button>
          </div>
          <p class="mt-6 text-center text-xs text-slate-600" data-i18n="home.tagline">
            Hyun Live Translator · 자동 언어 감지 · 다국어 자막
          </p>
        </section>

        <!-- ============ TRANSLATE (quick) ============ -->
        <section data-view="translate" hidden>
          <div id="qkClarify" class="mb-3 hidden rounded-xl border border-sky-500/60 bg-sky-950/40 p-3 text-sky-100"></div>
          <div id="qkRisk" class="mb-3 hidden rounded-xl border p-3"></div>
          <div id="qkTranscript" class="scroll-thin fs-md min-h-[50vh] space-y-3">
            <p class="qk-ph mt-10 text-center text-sm text-slate-600" data-i18n="tr.ph">
              아래 시작을 누르고 말하면 통역됩니다.<br />표시 언어는 설정에서 최대 3개까지 고를 수 있어요.
            </p>
          </div>
        </section>

        <!-- ============ NOTES LIST ============ -->
        <section data-view="notes" hidden>
          <div class="mb-4 flex items-center gap-2">
            <input id="noteSearch" type="search" data-i18n-ph="notes.search" placeholder="주제·내용·날짜 검색"
              class="w-full rounded-xl border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-indigo-500 focus:outline-none" />
          </div>
          <div id="notesList" class="space-y-2"></div>
          <p id="notesEmpty" class="mt-10 text-center text-sm text-slate-600" data-i18n="notes.empty">
            아직 노트가 없습니다. 아래 "새 노트"로 시작하세요.
          </p>
        </section>

        <!-- ============ NOTE DETAIL ============ -->
        <section data-view="note" hidden>
          <div class="mb-3">
            <input id="noteTitle" class="w-full bg-transparent text-xl font-bold outline-none" />
            <div id="noteDate" class="text-xs text-slate-500"></div>
          </div>

          <!-- tabs -->
          <div class="mb-3 flex border-b border-slate-800 text-sm">
            <button data-tab="log" class="note-tab flex-1 border-b-2 py-2 font-medium" data-i18n="note.tabLog">기록</button>
            <button data-tab="summary" class="note-tab flex-1 border-b-2 py-2 font-medium" data-i18n="note.tabSummary">요약</button>
          </div>

          <!-- view-mode + actions -->
          <div class="mb-3 flex flex-wrap items-center gap-2 text-xs">
            <select id="viewMode" class="rounded-lg border border-slate-700 bg-slate-800 px-2 py-1.5 text-slate-100 focus:outline-none">
              <option value="both" data-i18n="vm.both">원문+번역</option>
              <option value="source" data-i18n="vm.source">원문만</option>
              <option value="trans" data-i18n="vm.trans">번역만</option>
            </select>
            <button id="noteSummarizeBtn" class="rounded-lg bg-emerald-600 px-3 py-1.5 font-semibold text-white hover:bg-emerald-500" data-i18n="note.summarize">요약</button>
            <button id="noteExportMd" class="rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1.5 text-slate-300 hover:bg-slate-700">MD</button>
            <button id="noteExportDocx" class="rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1.5 text-slate-300 hover:bg-slate-700">Word</button>
            <button id="noteExportPdf" class="rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1.5 text-slate-300 hover:bg-slate-700">PDF</button>
            <button id="noteDelete" class="ml-auto rounded-lg border border-rose-900/50 bg-rose-950/30 px-2.5 py-1.5 text-rose-300 hover:bg-rose-950/60" data-i18n="note.delete">삭제</button>
          </div>

          <div data-pane="log">
            <div id="noteClarify" class="mb-3 hidden rounded-xl border border-sky-500/60 bg-sky-950/40 p-3 text-sky-100"></div>
            <div id="noteRisk" class="mb-3 hidden rounded-xl border p-3"></div>
            <div id="noteTranscript" class="scroll-thin fs-md min-h-[40vh] space-y-3">
              <p class="note-ph mt-10 text-center text-sm text-slate-600" data-i18n="note.ph">
                아래 <b>시작</b>을 누르면 녹음·통역이 시작되고 여기에 기록됩니다.
              </p>
            </div>
          </div>

          <div data-pane="summary" hidden>
            <div class="mb-3 flex gap-2">
              <input id="askInput" type="text" data-i18n-ph="qa.ph" placeholder="예: 결제 조건이 어떻게 정해졌지?"
                class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-sky-500 focus:outline-none" />
              <button id="askBtn" class="shrink-0 rounded-lg bg-sky-600 px-3 py-2 text-sm font-semibold text-white hover:bg-sky-500" data-i18n="qa.ask">질문</button>
            </div>
            <div id="askAnswer" class="mb-3 hidden whitespace-pre-wrap rounded-lg bg-slate-950/60 p-3 text-sm text-slate-200"></div>
            <div id="summaryContent" class="whitespace-pre-wrap rounded-lg bg-slate-950/40 p-3 text-sm leading-relaxed text-slate-200"></div>
          </div>
        </section>

        <!-- ============ SETTINGS ============ -->
        <section data-view="settings" hidden>
          <div class="space-y-5 text-sm">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="mb-1 block font-medium text-slate-400" data-i18n="set.uiLang">앱 언어</label>
                <select id="uiLang" class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-slate-100 focus:outline-none">
                  <option value="ko">한국어</option><option value="en">English</option>
                </select>
              </div>
              <div>
                <label class="mb-1 block font-medium text-slate-400" data-i18n="set.theme">테마</label>
                <select id="themeSel" class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-slate-100 focus:outline-none">
                  <option value="dark" data-i18n="set.dark">🌙 밤(어둡게)</option>
                  <option value="light" data-i18n="set.light">☀️ 낮(밝게)</option>
                </select>
              </div>
            </div>

            <div>
              <label class="mb-1 block font-medium text-slate-400" data-i18n="set.fontSize">글자 크기</label>
              <select id="fontSel" class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-slate-100 focus:outline-none">
                <option value="sm">작게</option><option value="md">보통</option><option value="lg">크게</option><option value="xl">아주 크게</option>
              </select>
            </div>

            <div>
              <label class="mb-1 block font-medium text-slate-400" data-i18n="set.output">출력(들리는) 언어</label>
              <select id="langB" class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-slate-100 focus:outline-none"></select>
              <p class="mt-1 text-xs text-slate-500" data-i18n="set.outputHelp">음성으로 나갈 1개 언어. 입력 언어는 자동 감지됩니다.</p>
            </div>

            <div>
              <label class="mb-1 block font-medium text-slate-400" data-i18n="set.display">표시(자막) 언어 · 최대 3</label>
              <div class="grid grid-cols-3 gap-2">
                <select id="displayLang1" class="rounded-lg border border-slate-700 bg-slate-800 px-2 py-1.5 text-xs text-slate-100 focus:outline-none"></select>
                <select id="displayLang2" class="rounded-lg border border-slate-700 bg-slate-800 px-2 py-1.5 text-xs text-slate-100 focus:outline-none"></select>
                <select id="displayLang3" class="rounded-lg border border-slate-700 bg-slate-800 px-2 py-1.5 text-xs text-slate-100 focus:outline-none"></select>
              </div>
              <p class="mt-1 text-xs text-slate-500" data-i18n="set.displayHelp">각 발화를 이 언어들로 함께 자막 표시(참가자 각자 읽기).</p>
            </div>

            <div>
              <label class="mb-1 block font-medium text-slate-400" data-i18n="set.voice">음성 (목소리)</label>
              <select id="voiceSelect" class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-slate-100 focus:outline-none">
                <optgroup label="여성 / Female"><option value="Aoede">Aoede</option><option value="Kore">Kore</option><option value="Leda">Leda</option><option value="Zephyr">Zephyr</option></optgroup>
                <optgroup label="남성 / Male"><option value="Puck">Puck</option><option value="Charon">Charon</option><option value="Fenrir">Fenrir</option><option value="Orus">Orus</option></optgroup>
              </select>
            </div>

            <div>
              <label class="mb-1 flex items-center justify-between font-medium text-slate-400">
                <span data-i18n="set.speed">빠르기</span><span id="speedValue" class="font-mono text-slate-300">1.0×</span>
              </label>
              <input id="speedRange" type="range" min="0.5" max="1.5" step="0.05" value="1.0" class="w-full accent-indigo-500" />
            </div>

            <div class="rounded-xl border border-amber-900/40 bg-amber-950/10 p-3">
              <label class="flex cursor-pointer items-center justify-between"><span class="font-medium text-amber-300" data-i18n="set.risk">🛡️ 리스크 감지</span><input id="riskToggle" type="checkbox" class="h-4 w-4 accent-amber-500" /></label>
              <input id="riskContext" type="text" data-i18n-ph="set.riskCtx" placeholder="분야 (예: oil trading)" class="mt-2 w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-1.5 text-xs text-slate-100 placeholder:text-slate-500 focus:outline-none" />
              <label class="mt-2 flex cursor-pointer items-center justify-between border-t border-amber-900/30 pt-2"><span class="font-medium text-sky-300" data-i18n="set.clarify">🔎 의미 확인</span><input id="clarifyToggle" type="checkbox" class="h-4 w-4 accent-sky-500" /></label>
            </div>

            <div class="rounded-xl border border-slate-800 bg-slate-950/60 p-3">
              <label class="mb-1 block font-medium text-slate-400" data-i18n="set.server">서버 주소</label>
              <input id="serverUrl" type="url" inputmode="url" placeholder="https://your-app.onrender.com" class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-slate-100 placeholder:text-slate-500 focus:outline-none" />
              <label class="mb-1 mt-3 block font-medium text-slate-400" data-i18n="set.token">접속 토큰</label>
              <input id="accessToken" type="password" autocomplete="off" data-i18n-ph="set.tokenPh" placeholder="서버 접속 토큰" class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-slate-100 placeholder:text-slate-500 focus:outline-none" />
              <button id="saveServerBtn" class="mt-2 w-full rounded-lg bg-indigo-600 px-3 py-2 font-semibold text-white hover:bg-indigo-500" data-i18n="set.save">저장</button>
              <div class="mt-2 flex justify-between text-xs text-slate-500"><span data-i18n="set.model">모델</span><span id="modelInfo" class="font-mono">—</span></div>
            </div>
          </div>
        </section>
      </main>

      <!-- ============ BOTTOM CONTROL BAR (translate + note) ============ -->
      <div id="controlBar" hidden class="sticky bottom-0 z-20 border-t border-slate-800 bg-slate-950/95 px-4 py-3 backdrop-blur">
        <div class="mb-2 flex items-center justify-center gap-2">
          <button id="modeAudioBtn" class="rounded-lg border px-3 py-1.5 text-xs font-medium transition" data-i18n="mode.audio">🔊 음성+자막</button>
          <button id="modeTextBtn" class="rounded-lg border px-3 py-1.5 text-xs font-medium transition" data-i18n="mode.text">📝 자막만</button>
        </div>
        <div class="flex items-center gap-2">
          <button id="toggleBtn" class="flex flex-1 items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-3 font-semibold text-white transition hover:bg-indigo-500 disabled:opacity-50">
            <span id="toggleIcon">▶️</span><span id="toggleLabel" data-i18n="ctrl.start">시작</span>
          </button>
          <button id="pauseBtn" disabled class="rounded-xl border border-slate-700 bg-slate-800 px-3 py-3 text-sm text-slate-300 hover:bg-slate-700 disabled:opacity-40">⏸️</button>
          <button id="replayBtn" disabled class="rounded-xl border border-slate-700 bg-slate-800 px-3 py-3 text-sm text-slate-300 hover:bg-slate-700 disabled:opacity-40">🔁</button>
          <button id="pronounceBtn" disabled class="rounded-xl border border-slate-700 bg-slate-800 px-3 py-3 text-sm text-slate-300 hover:bg-slate-700 disabled:opacity-40">🗣️</button>
        </div>
        <div id="pronounceBox" class="mt-2 hidden rounded-lg border border-slate-800 bg-slate-950/60 p-2">
          <div class="mb-1 flex items-center justify-between">
            <span class="text-[10px] font-semibold uppercase tracking-wide text-amber-400" data-i18n="pron.title">발음</span>
            <select id="scriptSelect" class="rounded border border-slate-700 bg-slate-800 px-1.5 py-0.5 text-xs text-slate-200 focus:outline-none">
              <option value="roman" data-i18n="pron.roman">로마자</option><option value="hangul" data-i18n="pron.hangul">한글</option>
            </select>
          </div>
          <div id="pronounceContent" class="text-sm text-slate-200"></div>
        </div>
      </div>

      <!-- New-note FAB (notes list) -->
      <button id="newNoteBtn" hidden class="sticky bottom-4 z-20 mx-4 mb-4 rounded-xl bg-indigo-600 px-4 py-3 font-semibold text-white shadow-lg hover:bg-indigo-500" data-i18n="notes.new">＋ 새 노트</button>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
